<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagePost Mock UI for Help</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6;
        }

        .mock-note {
            background-color: #FFF9C4;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border-radius: 0.5rem;
            transition: all 0.3s;
        }

        .mock-toolbar {
            background-color: #111827;
            border: 2px solid #FFD54F;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 25px rgba(255, 213, 79, 0.2);
        }
    </style>
</head>

<body class="p-10">
    <!-- Step 1: Note Creation Mock -->
    <div id="step-note" class="mb-20">
        <h1 class="text-2xl font-bold mb-4">Step 1: 메모 생성</h1>
        <div class="relative w-full h-80 bg-white rounded-xl border border-gray-200 overflow-hidden p-4">
            <p class="text-gray-400">웹사이트 본문 내용...</p>
            <div class="mock-note absolute top-20 left-20 w-48 p-3 animate-bounce">
                <div class="flex justify-between items-center mb-2">
                    <div class="w-3 h-3 bg-red-400 rounded-full"></div>
                    <div class="text-[10px] text-gray-500">2026.03.20</div>
                </div>
                <div class="text-xs text-gray-800 font-medium">여기에 메모를 작성하세요! ✍️</div>
            </div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="bg-black/70 text-white px-4 py-2 rounded-full text-sm font-bold">더블 클릭 또는 Alt+N</div>
            </div>
        </div>
    </div>

    <!-- Step 2: Markup Mock -->
    <div id="step-markup" class="mb-20">
        <h1 class="text-2xl font-bold mb-4">Step 2: 마크업 도구</h1>
        <div class="relative w-full h-96 bg-white rounded-xl border border-gray-200 overflow-hidden p-4">
            <h2 class="text-xl font-bold mb-4 text-gray-800">중요한 정보</h2>
            <p class="text-gray-600 mb-4 bg-yellow-200 inline-block p-1">이 부분을 강조하고 싶다면 형광펜을 사용하세요.</p>
            <svg class="absolute top-20 left-40 w-40 h-40 pointer-events-none">
                <path d="M 10 10 L 100 80" stroke="#FF5252" stroke-width="4" fill="none" />
                <path d="M 90 60 L 100 80 L 75 80" stroke="#FF5252" stroke-width="4" fill="none" />
            </svg>
            <!-- Floating Toolbar Mock -->
            <div
                class="mock-toolbar absolute bottom-10 left-1/2 -translate-x-1/2 h-14 rounded-2xl flex items-center px-4 gap-4 text-white">
                <div class="bg-amber-400 p-2 rounded-xl"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="black" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg></div>
                <div class="w-px h-6 bg-white/20"></div>
                <div class="flex gap-2 text-amber-400">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 19l7-7 3 3-7 7-3-3zM18 13l-1.5-1.5M14 11l-1.5-1.5" />
                        <path d="M2.8 2.8L12 12M2.8 21.2L12 12M21.2 21.2L12 12" />
                    </svg>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Step 3: Capture Mock -->
    <div id="step-capture" class="mb-20">
        <h1 class="text-2xl font-bold mb-4">Step 3: 스크롤 캡쳐</h1>
        <div
            class="relative w-full h-80 bg-gray-900 rounded-xl overflow-hidden flex flex-col items-center justify-center gap-6">
            <div class="bg-gray-800/90 border border-white/20 p-2 rounded-3xl flex items-center gap-1 shadow-2xl">
                <div class="bg-amber-400 text-black px-4 py-2 rounded-2xl font-bold flex items-center gap-2">영역 선택</div>
                <div class="text-gray-400 px-4 py-2 flex items-center gap-2">전체 화면</div>
                <div class="text-gray-400 px-4 py-2 flex items-center gap-2">스크롤 캡쳐</div>
            </div>
            <div class="text-amber-400 text-sm animate-pulse">드래그하여 캡쳐할 영역을 선택하거나 버튼을 누르세요.</div>
        </div>
    </div>

    <!-- Step 4: MiniMap Mock -->
    <div id="step-nav" class="mb-20">
        <h1 class="text-2xl font-bold mb-4">Step 4: 가이드 및 관리</h1>
        <div class="relative w-full h-80 bg-white rounded-xl border border-gray-200 overflow-hidden flex">
            <div class="flex-1 p-4 grid grid-cols-2 gap-4">
                <div class="bg-gray-50 border border-gray-100 rounded-lg p-3 h-24">
                    <div class="w-10 h-2 bg-amber-200 rounded mb-2"></div>
                    <div class="w-20 h-2 bg-gray-200 rounded"></div>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-lg p-3 h-24">
                    <div class="w-10 h-2 bg-blue-200 rounded mb-2"></div>
                    <div class="w-20 h-2 bg-gray-200 rounded"></div>
                </div>
            </div>
            <!-- MiniMap Mock on right -->
            <div class="w-5 h-full bg-black/5 border-l border-gray-100 flex flex-col items-center py-10 gap-20">
                <div class="w-3 h-3 bg-amber-400 rounded-full shadow-lg"></div>
                <div class="w-3 h-3 bg-blue-400 rounded-full shadow-lg"></div>
                <div class="w-3 h-3 bg-green-400 rounded-full shadow-lg"></div>
            </div>
        </div>
    </div>
</body>

</html>
